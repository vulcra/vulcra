<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | Guilherme Ferreira</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #F4F6F8; 
            --bg-card: #FFFFFF; 
            --charcoal: #3C4146; 
            --bronze: #B89C79; 
            --gray-light: #F0F4F8; 
            --bronze-light: #E8DCC8; /* Cor suave para o bloco inferior esquerdo */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-body);
            color: var(--charcoal);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden; /* Scroll vertical ativado, horizontal bloqueado */
        }

        /* --- 1. SEÇÃO HERO (BENTO GRID) --- */
        .hero-bento {
            height: 100vh;
            width: 100vw;
            display: grid;
            grid-template-columns: 35vw 65vw; /* Divisão Esquerda / Direita */
            grid-template-rows: 65vh 35vh; /* Divisão Cima / Baixo na Esquerda */
        }

        /* Bloco 1: Logo (Branco) */
        .bento-logo {
            background-color: var(--bg-card);
            display: flex;
            justify-content: center;
            align-items: center;
            grid-column: 1 / 2;
            grid-row: 1 / 2;
            text-decoration: none; /* Funciona como link de voltar */
            transition: background 0.3s;
        }
        .bento-logo:hover { background-color: var(--gray-light); }
        .bento-logo img { width: 120px; opacity: 0.9; }

        /* Bloco 2: Texto (Bronze Claro) */
        .bento-text {
            background-color: var(--bronze-light);
            display: flex;
            justify-content: center;
            align-items: center;
            grid-column: 1 / 2;
            grid-row: 2 / 3;
            color: var(--charcoal);
        }
        .bento-text h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            letter-spacing: 2px;
        }

        /* Bloco 3: Vídeo Imersivo */
        .bento-video {
            grid-column: 2 / 3;
            grid-row: 1 / 3; /* Ocupa a direita inteira */
            position: relative;
            overflow: hidden;
        }
        .bento-video video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Faz o vídeo preencher todo o espaço sem distorcer */
            filter: brightness(0.9); /* Escurece um pouquinho pra ficar elegante */
        }

        /* --- 2. SEÇÃO DE CATEGORIAS (SCROLL PARA BAIXO) --- */
        .categories-section {
            padding: 15vh 5vw;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--charcoal);
            text-align: center;
            margin-bottom: 10vh;
        }

        .category-grid {
            display: flex;
            flex-direction: column;
            gap: 5vh;
        }

        /* Os Cards de Categoria */
        .cat-card {
            width: 100%;
            height: 60vh;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            display: flex;
            align-items: flex-end;
            padding: 50px;
            /* Prepara o card para a animação de entrada */
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s ease-out;
        }
        
        /* Classe que o JavaScript adiciona quando o card aparece na tela */
        .cat-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .cat-card::before {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(60, 65, 70, 0.9) 0%, rgba(60, 65, 70, 0) 60%);
            z-index: 1;
            transition: background 0.5s;
        }

        .cat-card:hover::before {
            background: linear-gradient(to top, rgba(60, 65, 70, 0.95) 0%, rgba(60, 65, 70, 0.3) 100%);
        }
        .cat-card:hover .cat-img { transform: scale(1.05); }

        .cat-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: transform 1.5s ease;
            z-index: 0;
        }

        .cat-content {
            position: relative;
            z-index: 2;
            color: #fff;
        }
        .cat-content h3 { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 10px; }
        .cat-content span { font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; color: var(--bronze); font-weight: 600; }

        /* Rodapé Simples */
        .simple-footer { text-align: center; padding: 50px; font-size: 0.8rem; color: #9CA3AF; }

    </style>
</head>
<body>

    <div class="hero-bento">
        <a href="index.html" class="bento-logo">
            <img src="logo.png" alt="Voltar para Home">
        </a>

        <div class="bento-text">
            <h2>Acervo</h2>
        </div>

        <div class="bento-video">
            <video autoplay muted loop playsinline>
                <source src="https://player.vimeo.com/external/517090081.hd.mp4?s=4d8a55dbb519e917dffcf6edb4a53ccb05615d3d&profile_id=175" type="video/mp4">
            </video>
        </div>
    </div>

    <section class="categories-section">
        <h1 class="section-title">Explore por Categoria</h1>
        
        <div class="category-grid">
            
            <a href="#" class="cat-card">
                <div class="cat-img" style="background-image: url('/guilhermeferreiraarquitetura/casa-ambiente-integrado.jpeg');"></div>
                <div class="cat-content">
                    <span>Obras Completas</span>
                    <h3>Arquitetura Residencial</h3>
                </div>
            </a>

            <a href="#" class="cat-card">
                <div class="cat-img" style="background-image: url('/guilhermeferreiraarquitetura/quarto-3.png');"></div>
                <div class="cat-content">
                    <span>Espaços Internos</span>
                    <h3>Design de Interiores</h3>
                </div>
            </a>

            <a href="#" class="cat-card">
                <div class="cat-img" style="background-image: url('/guilhermeferreiraarquitetura/predio-1.jpeg');"></div>
                <div class="cat-content">
                    <span>Estratégia e Negócio</span>
                    <h3>Projetos Comerciais</h3>
                </div>
            </a>

        </div>
    </section>

    <div class="simple-footer">
        &copy; 2026 Desenvolvido por VULCRA
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const cards = document.querySelectorAll('.cat-card');

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    // Quando o card entra na tela, adiciona a classe 'visible'
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, {
                threshold: 0.2 // Dispara quando 20% do card estiver visível
            });

            cards.forEach(card => {
                observer.observe(card);
            });
        });
    </script>
</body>
</html>
