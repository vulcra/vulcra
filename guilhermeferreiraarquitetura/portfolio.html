<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | Guilherme Ferreira</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #F4F6F8; 
            --bg-card: #FFFFFF; 
            --charcoal: #3C4146; 
            --bronze: #B89C79; 
            --gray-light: #F0F4F8; 
            --bronze-light: #E8DCC8; /* Cor suave para o bloco inferior esquerdo */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-body);
            color: var(--charcoal);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden; /* Scroll vertical ativado, horizontal bloqueado */
        }

        /* --- 1. SEÇÃO HERO (BENTO GRID COM VÍDEO ABSOLUTO) --- */
        .hero-bento {
            position: relative;
            height: 100vh;
            width: 100vw;
            display: grid;
            /* O ENCAIXE TETRIS: Coluna 1 (Branca/Vidro: 30vw) | Coluna 2 (Bronze: 30vw) | Coluna 3 (Vídeo: 40vw) */
            grid-template-columns: 40vw 30vw 40vw; 
            grid-template-rows: 65vh 35vh; /* Divisão Cima / Baixo */
            overflow: hidden;
        }

        /* O Vídeo Imersivo no Fundo de Tudo */
        .bg-video {
            position: absolute;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1; 
            filter: brightness(0.85); 
        }

        /* Bloco 1: Logo Branca (AGORA PRESA APENAS NA COLUNA 1) */
        .bento-logo {
            background-color: var(--bg-card);
            display: flex;
            justify-content: center;
            align-items: center;
            grid-column: 1 / 2; /* Fica restrita à primeira coluna */
            grid-row: 1 / 2;
            text-decoration: none; 
            z-index: 2;
        }
        .bento-logo img { 
            width: 450px; 
            max-width: 80%;
            opacity: 0.95; 
            transition: transform 0.5s ease;
        }
        .bento-logo:hover img { transform: scale(1.05); }

        /* Bloco 2: A Máscara Translúcida (EXATAMENTE EMBAIXO DA BRANCA) */
        .bento-glass {
            grid-column: 1 / 2; /* Mesma coluna da branca */
            grid-row: 2 / 3; /* Na linha de baixo */
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            z-index: 2;
            border-right: 1px solid rgba(255, 255, 255, 0.2); 
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Bloco 3: Caixa Bronze (AO LADO DA TRANSLÚCIDA, FORA DA BRANCA) */
        .bento-text {
            background-color: var(--bronze-light);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
            grid-column: 2 / 3; /* Coluna 2! Fica livre do teto branco */
            grid-row: 2 / 3; /* Alinhada na altura da área de vidro */
            color: var(--charcoal);
            z-index: 2;
        }
        .bento-text h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            letter-spacing: 2px;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        /* Estilização do Botão de Solicitação */
        .btn-bento-cta {
            background-color: var(--charcoal); color: #FFFFFF; padding: 14px 24px; border: none;
            font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: all 0.3s;
            margin-top: 5px; border-radius: 6px; text-decoration: none; display: inline-block;
        }
        .btn-bento-cta:hover { background-color: var(--bronze); }

        /* --- 2. SEÇÃO DE CATEGORIAS (SCROLL PARA BAIXO) --- */
        .categories-section {
            padding: 15vh 5vw;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--charcoal);
            text-align: center;
            margin-bottom: 10vh;
        }

        .category-grid { display: flex; flex-direction: column; gap: 5vh; }

        .cat-card {
            width: 100%; height: 60vh; position: relative; border-radius: 12px; overflow: hidden;
            text-decoration: none; display: flex; align-items: flex-end; padding: 50px;
            opacity: 0; transform: translateY(50px); transition: all 0.8s ease-out;
        }
        
        .cat-card.visible { opacity: 1; transform: translateY(0); }

        .cat-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(60, 65, 70, 0.9) 0%, rgba(60, 65, 70, 0) 60%);
            z-index: 1; transition: background 0.5s;
        }

        .cat-card:hover::before { background: linear-gradient(to top, rgba(60, 65, 70, 0.95) 0%, rgba(60, 65, 70, 0.3) 100%); }
        .cat-card:hover .cat-img { transform: scale(1.05); }

        .cat-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; transition: transform 1.5s ease; z-index: 0; }

        .cat-content { position: relative; z-index: 2; color: #fff; }
        .cat-content h3 { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 10px; }
        .cat-content span { font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; color: var(--bronze); font-weight: 600; }

        /* Rodapé com Link */
        .simple-footer { text-align: center; padding: 50px; font-size: 0.8rem; color: #9CA3AF; letter-spacing: 1px; }
        .simple-footer a { color: var(--bronze); font-weight: 700; text-decoration: none; transition: color 0.3s; }
        .simple-footer a:hover { color: var(--charcoal); text-decoration: underline; }

    </style>
</head>
<body>

    <div class="hero-bento">
        
        <video autoplay muted loop playsinline class="bg-video">
            <source src="video-portfolio.mp4" type="video/mp4">
        </video>

        <a href="/guilhermeferreiraarquitetura/index.html" class="bento-logo">
            <img src="/guilhermeferreiraarquitetura/logo.png" alt="Voltar para Home">
        </a>

        <div class="bento-glass"></div>

        <div class="bento-text">
            <h2>Obras<br>Selecionadas</h2>
            <a href="/guilhermeferreiraarquitetura/index.html#contato" class="btn-bento-cta">Solicitar Novo Projeto</a>
        </div>

    </div>

    <section class="categories-section">
        <h1 class="section-title">Explore por Categoria</h1>
        
        <div class="category-grid">
            
            <a href="#" class="cat-card">
                <div class="cat-img" style="background-image: url('/guilhermeferreiraarquitetura/casa-ambiente-integrado.jpeg');"></div>
                <div class="cat-content">
                    <span>Obras Completas</span>
                    <h3>Arquitetura Residencial</h3>
                </div>
            </a>

            <a href="#" class="cat-card">
                <div class="cat-img" style="background-image: url('/guilhermeferreiraarquitetura/quarto-3.png');"></div>
                <div class="cat-content">
                    <span>Espaços Internos</span>
                    <h3>Design de Interiores</h3>
                </div>
            </a>

            <a href="#" class="cat-card">
                <div class="cat-img" style="background-image: url('/guilhermeferreiraarquitetura/predio-1.jpeg');"></div>
                <div class="cat-content">
                    <span>Estratégia e Negócio</span>
                    <h3>Projetos Comerciais</h3>
                </div>
            </a>

        </div>
    </section>

    <div class="simple-footer">
        &copy; 2026 Desenvolvido por <a href="https://www.vulcra.com.br" target="_blank">VULCRA</a>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const cards = document.querySelectorAll('.cat-card');

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.2 });

            cards.forEach(card => {
                observer.observe(card);
            });
        });
    </script>
</body>
</html>
